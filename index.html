<!DOCTYPE html>
<html>
    <head>
        <title>WowOS</title>
        <link rel="stylesheet" type="text/css" href="/style.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="robots" content="noai, noimageai">
        <link href="https://i.22291111.xyz/avatar.jpg" rel="icon" type="image/x-icon">
    </head>
    
    <body>

        <!--TOPBAR-->

        <div class="topbar">
            <p>WowOS</p>
            <p id="topbar-time">Time and Date</p>
        </div>

        <!--LOGIN-->

        <div class="window" id="login">
            <div id="loginheader" class="wheader" style="display: flex; justify-content: space-between;">
                <p>Username: Wowstar</p>
            </div>
            <br>
            <div class="loginbottom" style="display: flex;">
                <input type="password" id="password" placeholder="Password">
                <button onclick="login()">Login</button>
            </div>
        </div>
        
        <script src="/js/drag.js"></script>
        <script src="/js/time.js"></script>
        <script src="/js/login.js"></script>
    </body>
</html>
